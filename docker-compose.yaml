
services:
  web3-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web3-chat-app
    restart: always
    ports:
      - "80:3000"
      - "443:3001"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_WAKU_NODES=true
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge
