services:
  web3-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web3-chat-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_WAKU_NODES=true
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge