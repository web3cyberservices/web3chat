services:
  web3-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web3-chat-app
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Прокидываем статику на хост для Nginx
      - ./_next_static:/app/.next/static
      - ./public_assets:/app/public
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge