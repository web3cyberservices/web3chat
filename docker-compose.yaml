version: '3.8'

services:
  reguscan-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reguscan-messenger
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_WAKU_NODES=true
    networks:
      - reguscan-network

networks:
  reguscan-network:
    driver: bridge
