
services:
  web3-chat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web3-chat-app
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - chat-network
    # Удалены все volumes для предотвращения затирания статики хостом

networks:
  chat-network:
    driver: bridge
