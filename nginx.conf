
server {
    listen 80;
    server_name chat.web3cyberservices.xyz;

    # Сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript font/woff2;

    # 1. Раздача статики Next.js напрямую (через volume)
    location /_next/static/ {
        alias /var/www/web3cyberservices/_next_static/;
        expires max;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 2. Раздача публичных ассетов и favicon
    location /public/ {
        alias /var/www/web3cyberservices/public_assets/;
        expires max;
        access_log off;
    }

    location = /favicon.ico {
        alias /var/www/web3cyberservices/public_assets/favicon.ico;
        expires max;
        access_log off;
    }

    # 3. Проксирование всего остального на Node.js (Standalone)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
