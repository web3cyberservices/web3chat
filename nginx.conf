server {
    listen 80;
    server_name chat.web3cyberservices.xyz;

    # Сжатие для быстрой передачи данных
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;

    # Проксируем ВСЕ запросы на Node.js (Standalone сервер сам отдаст статику)
    # Это исключает 404 ошибки из-за пустых томов на хосте
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Увеличиваем таймауты для долгоживущих P2P соединений Waku
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}